<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Paint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="settings-panel">
            <div class="settings-wrapper">
                <div class="input">
                    <label for="width">Ширина поля:</label>
                    <input type="number" id="width">
                </div>
                <input type="color" id="color">
                <div class="input">
                    <label for="height">Высота поля:</label>
                    <input type="number" id="height">
                </div>
            </div>
            <div class="settings-wrapper">
                <button id="create-button">Создать поле</button>
            <button id="clear-button">Очистить поле</button>
            <button id="erase">Ластик</button>
            <button id="paint">Маркер</button>
            </div>
        </div>
        <div class="field"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
